<script id="nordsym-booking-flow">
(function(){
  var endpoint = "https://nordsym.app.n8n.cloud/webhook/aeo-booking";
  var state = { focus: "", date: "", time: "", name: "", email: "", company: "", notes: "" };
  var main = document.querySelector("main");
  if (!main) return;
  var sections = Array.prototype.slice.call(main.children);
  var stepper = sections[0];
  var content = sections[1];
  var nav = sections[2];
  if (!stepper || !content || !nav) return;
  var back = nav.querySelector("button:first-child");
  var next = nav.querySelector("button:last-child");
  back.id = "booking-back";
  next.id = "booking-continue";
  var step = 1;

  function text(value) {
    return String(value || "").replace(/[&<>"']/g, function(ch){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch];
    });
  }

  function setBrief(label, value) {
    var labels = Array.prototype.slice.call(document.querySelectorAll("aside div"));
    var item = labels.find(function(el){ return el.textContent.trim().toLowerCase() === label.toLowerCase(); });
    if (!item || !item.parentElement) return;
    var target = item.parentElement.children[1];
    if (target) {
      target.textContent = value || "-";
      target.style.color = value ? "rgb(33, 29, 23)" : "rgb(181, 173, 156)";
    }
  }

  function activateNext(enabled) {
    next.disabled = !enabled;
    next.style.cursor = enabled ? "pointer" : "not-allowed";
    next.style.background = enabled ? "rgb(33, 29, 23)" : "rgba(33, 29, 23, 0.12)";
    next.style.color = enabled ? "rgb(245, 241, 232)" : "rgba(33, 29, 23, 0.4)";
  }

  function paintStepper() {
    var circles = Array.prototype.slice.call(stepper.querySelectorAll("span")).filter(function(el){
      return /^[1-4]$/.test(el.textContent.trim());
    });
    circles.forEach(function(el, index){
      var active = index + 1 <= step;
      el.style.background = active ? "rgb(33, 29, 23)" : "transparent";
      el.style.color = active ? "rgb(245, 241, 232)" : "rgb(154, 147, 132)";
      el.style.borderColor = active ? "rgb(33, 29, 23)" : "rgba(33, 29, 23, 0.25)";
    });
    back.style.pointerEvents = step === 1 ? "none" : "auto";
    back.style.color = step === 1 ? "rgba(33, 29, 23, 0.25)" : "rgb(90, 83, 71)";
  }

  function choiceButton(title, body, attrs) {
    attrs = attrs || "";
    return '<button '+attrs+' style="text-align:left;cursor:pointer;padding:16px 18px;border-radius:4px;background:rgb(250,247,240);border:1px solid rgba(33,29,23,.16);box-shadow:none;transition:background .2s,border-color .2s,box-shadow .2s;">'
      + '<div style="display:flex;align-items:baseline;justify-content:space-between;gap:12px;">'
      + '<span style="font-size:16px;font-weight:500;">'+text(title)+'</span>'
      + '<span style="font-family:&quot;IBM Plex Mono&quot;,monospace;font-size:14px;color:rgb(168,67,43);">◇</span></div>'
      + '<div style="font-size:13px;color:rgb(90,83,71);margin-top:4px;">'+text(body)+'</div></button>';
  }

  function renderFocus() {
    step = 1;
    content.innerHTML = '<div style="animation:.35s ease 0s 1 normal both running fadeup;flex:1;display:flex;flex-direction:column;">'
      + '<h2 style="font-family:Newsreader,serif;font-weight:400;font-size:clamp(24px,3.4vw,32px);letter-spacing:-.02em;margin:0 0 6px;">What should we operate?</h2>'
      + '<p style="font-size:14.5px;color:rgb(90,83,71);margin:0 0 22px;">Pick the closest starting point. We will refine it on the call.</p>'
      + '<div style="display:flex;flex-direction:column;gap:10px;">'
      + choiceButton("Architecture sprint", "Map the stack, design the operating layer.", 'data-focus="Architecture sprint"')
      + choiceButton("Operating retainer", "We build, run, and improve the operation.", 'data-focus="Operating retainer"')
      + choiceButton("Embedded program", "Stand up the layer as internal capability.", 'data-focus="Embedded program"')
      + choiceButton("Still exploring", "Not sure yet. Let us talk it through.", 'data-focus="Still exploring"')
      + '</div></div>';
    content.querySelectorAll("[data-focus]").forEach(function(btn){
      btn.addEventListener("click", function(){
        state.focus = btn.getAttribute("data-focus");
        setBrief("Focus", state.focus);
        content.querySelectorAll("[data-focus]").forEach(function(other){
          other.style.borderColor = other === btn ? "rgb(168, 67, 43)" : "rgba(33, 29, 23, 0.16)";
          other.style.background = other === btn ? "rgba(168, 67, 43, 0.06)" : "rgb(250,247,240)";
        });
        activateNext(true);
      });
    });
    next.textContent = "Continue";
    activateNext(!!state.focus);
    paintStepper();
  }

  function renderTime() {
    step = 2;
    var days = ["Tomorrow", "This week", "Next week"];
    var times = ["09:30", "11:00", "14:00", "16:00"];
    content.innerHTML = '<div style="animation:.35s ease 0s 1 normal both running fadeup;flex:1;display:flex;flex-direction:column;">'
      + '<h2 style="font-family:Newsreader,serif;font-weight:400;font-size:clamp(24px,3.4vw,32px);letter-spacing:-.02em;margin:0 0 6px;">Pick a window.</h2>'
      + '<p style="font-size:14.5px;color:rgb(90,83,71);margin:0 0 22px;">Choose a preferred day and time. I will confirm the calendar slot by email.</p>'
      + '<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px;">'
      + days.map(function(day){ return choiceButton(day, "Preferred day", 'data-date="'+day+'"'); }).join("")
      + '</div><div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;">'
      + times.map(function(t){ return choiceButton(t, "Europe/Stockholm", 'data-time="'+t+'"'); }).join("")
      + '</div></div>';
    content.querySelectorAll("[data-date]").forEach(function(btn){
      btn.addEventListener("click", function(){
        state.date = btn.getAttribute("data-date");
        setBrief("Date", state.date);
        content.querySelectorAll("[data-date]").forEach(function(other){ other.style.borderColor = other === btn ? "rgb(168,67,43)" : "rgba(33,29,23,.16)"; });
        activateNext(!!state.date && !!state.time);
      });
    });
    content.querySelectorAll("[data-time]").forEach(function(btn){
      btn.addEventListener("click", function(){
        state.time = btn.getAttribute("data-time");
        setBrief("Time", state.time);
        content.querySelectorAll("[data-time]").forEach(function(other){ other.style.borderColor = other === btn ? "rgb(168,67,43)" : "rgba(33,29,23,.16)"; });
        activateNext(!!state.date && !!state.time);
      });
    });
    activateNext(!!state.date && !!state.time);
    paintStepper();
  }

  function input(name, label, type) {
    return '<label style="display:grid;gap:6px;font-size:13px;color:rgb(90,83,71);">'+text(label)
      + '<input name="'+name+'" type="'+(type || "text")+'" required style="width:100%;border:1px solid rgba(33,29,23,.16);background:rgb(250,247,240);border-radius:4px;padding:13px 14px;color:rgb(33,29,23);outline:none;"></label>';
  }

  function renderDetails() {
    step = 3;
    content.innerHTML = '<form id="booking-details" style="animation:.35s ease 0s 1 normal both running fadeup;flex:1;display:flex;flex-direction:column;">'
      + '<h2 style="font-family:Newsreader,serif;font-weight:400;font-size:clamp(24px,3.4vw,32px);letter-spacing:-.02em;margin:0 0 6px;">Where should I send the confirmation?</h2>'
      + '<p style="font-size:14.5px;color:rgb(90,83,71);margin:0 0 22px;">A short note is enough. We will map the rest on the call.</p>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">'+input("name","Name")+input("email","Email","email")+'</div>'
      + input("company","Company") + '<label style="display:grid;gap:6px;font-size:13px;color:rgb(90,83,71);margin-top:12px;">Notes<textarea name="notes" rows="4" style="width:100%;border:1px solid rgba(33,29,23,.16);background:rgb(250,247,240);border-radius:4px;padding:13px 14px;color:rgb(33,29,23);outline:none;resize:vertical;"></textarea></label>'
      + '</form>';
    var form = content.querySelector("form");
    form.addEventListener("input", function(){
      state.name = form.elements.name.value.trim();
      state.email = form.elements.email.value.trim();
      state.company = form.elements.company.value.trim();
      state.notes = form.elements.notes.value.trim();
      setBrief("Contact", state.name || state.email);
      activateNext(!!state.name && !!state.email && !!state.company);
    });
    next.textContent = "Send request";
    activateNext(!!state.name && !!state.email && !!state.company);
    paintStepper();
  }

  function renderConfirmed(ok) {
    step = 4;
    content.innerHTML = '<div style="animation:.35s ease 0s 1 normal both running fadeup;flex:1;display:flex;flex-direction:column;justify-content:center;">'
      + '<h2 style="font-family:Newsreader,serif;font-weight:400;font-size:clamp(28px,3.8vw,40px);letter-spacing:-.02em;margin:0 0 12px;">'+(ok ? "Request sent." : "Could not send.")+'</h2>'
      + '<p style="font-size:15px;line-height:1.6;color:rgb(90,83,71);max-width:44ch;margin:0;">'+(ok ? "I will confirm the calendar slot by email." : "Email contact@nordsym.com and I will pick this up manually.")+'</p>'
      + '</div>';
    next.style.display = "none";
    back.textContent = "Start over";
    back.style.pointerEvents = "auto";
    back.style.color = "rgb(90, 83, 71)";
    paintStepper();
  }

  async function submit() {
    next.disabled = true;
    next.textContent = "Sending";
    try {
      var res = await fetch(endpoint, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(Object.assign({ source: "nordsym.com/book", submittedAt: new Date().toISOString() }, state))
      });
      renderConfirmed(res.ok);
    } catch (err) {
      renderConfirmed(false);
    }
  }

  next.addEventListener("click", function(){
    if (step === 1 && state.focus) return renderTime();
    if (step === 2 && state.date && state.time) return renderDetails();
    if (step === 3 && state.name && state.email && state.company) return submit();
  });
  back.addEventListener("click", function(){
    if (step === 1) return;
    if (step === 4) {
      next.style.display = "";
      back.textContent = "← Back";
      state = { focus: "", date: "", time: "", name: "", email: "", company: "", notes: "" };
      ["Focus","Date","Time","Contact"].forEach(function(label){ setBrief(label, ""); });
      return renderFocus();
    }
    if (step === 3) return renderTime();
    if (step === 2) return renderFocus();
  });
  renderFocus();
})();
</script>
