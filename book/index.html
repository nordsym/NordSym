    "utm_source",
    "utm_medium",
    "utm_campaign",
    "utm_content",
    "utm_term"
  ];
  var ACQUISITION_ALLOWED = {
    source: ["meta_paid"],
    company_size: ["1-4", "5-14", "15-49", "50+"],
    cadence: ["sporadic", "monthly", "weekly", "daily"],
    bottleneck: ["ideas", "production", "approval", "publishing", "distribution", "measurement"],
    systems_count: ["1", "2", "3+"],
    timing: ["now", "quarter", "exploring"]
  };
  var UTM_PARAM_KEYS = ["utm_id", "utm_source", "utm_medium", "utm_campaign", "utm_content", "utm_term"];
  var params = new URLSearchParams(window.location.search);
  var paidVariant = params.get("lang") === SUPPORTED_ROUTE.lang && params.get("offer") === SUPPORTED_ROUTE.offer;
  var paidFocus = "Innehåll till distribution";
  var webhookSource = paidVariant ? "nordsym.com/lp/innehallsoperation" : "nordsym.com/book";
  var acquisition = {};

  function categoricalValue(value) {
    return String(value || "")
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9._~-]+/g, "_")
      .replace(/^_+|_+$/g, "")
      .slice(0, 120);
  }

  Object.keys(ACQUISITION_ALLOWED).forEach(function(key){
    var value = params.get(key);
    if (ACQUISITION_ALLOWED[key].indexOf(value) !== -1) acquisition[key] = value;
  });
  UTM_PARAM_KEYS.forEach(function(key){
    var value = categoricalValue(params.get(key));
    if (value) acquisition[key] = value;
  });

  var analyticsContext = Object.assign({
    booking_variant: paidVariant ? "innehallsoperation_sv" : "default"
  }, acquisition);
  if (paidVariant) {
    analyticsContext.lang = SUPPORTED_ROUTE.lang;
    analyticsContext.offer = SUPPORTED_ROUTE.offer;
  }
  window.__nordsymAnalyticsContext = analyticsContext;

  var copy = paidVariant ? {
    title: "Boka ett samtal - NordSym",
    description: "Boka ett samtal med NordSym om en styrd innehållsoperation från produktion till distribution.",
    heading: "Boka ett samtal med NordSym",
    briefHeading: "Ditt underlag",
    briefLabels: { focus: "Fokus", date: "Datum", time: "Tid", contact: "Kontakt" },
    railDescription: "Ett 30-minuterssamtal med grundaren.<br>Ingen presentation. Vi kartlägger era system<br>och var operationslagret passar.",
    stepLabels: ["Fokus", "Tid", "Uppgifter", "Klart"],
    back: "← Tillbaka",
    startOver: "Börja om",
    continue: "Fortsätt",
    focusHeading: "Vad ska vi börja driva?",
    focusDescription: "Välj närmast utgångspunkt. Vi preciserar den under samtalet.",
    focusOptions: [
      {
        value: paidFocus,

        body: "Koppla innehåll till ett återkommande distributionsflöde. Vi kartlägger system och beslut, bygger det styrda lagret och börjar driva operationen."
      },
      {
        value: "Managed operations",
        title: "Löpande operationer",
        body: "Vi driver och förbättrar sammankopplade operationer löpande."
      },
      {
        value: "Operating expansion",
        title: "Utökat operationslager",
        body: "Utöka operationslagret till fler delar av verksamheten."
      },
      {
        value: "Still exploring",
        title: "Utforskar fortfarande",
        body: "Inte helt säker än. Vi går igenom det tillsammans."
      }
    ],
    dayLabels: ["Nästa vardag", "Om några dagar", "Nästa vecka"],
    timeHeading: "Välj en tid.",
    timeDescription: "Välj önskad dag och tid. En kalenderinbjudan skickas om tiden är tillgänglig.",
    detailsHeading: "Vart ska jag skicka bekräftelsen?",
    detailsDescription: "En kort notering räcker. Vi kartlägger resten under samtalet.",
    fields: { name: "Namn", email: "E-post", company: "Företag", notes: "Anteckningar" },
    send: "Skicka förfrågan",

    sentHeading: "Förfrågan skickad.",
    failedHeading: "Kunde inte skicka.",
    sentDescription: "Kalenderinbjudan är skickad. Mötesuppgifterna kommer också via e-post.",
    fallback: "Mejla contact@nordsym.com så tar jag hand om det manuellt."
  } : {
    briefLabels: { focus: "Focus", date: "Date", time: "Time", contact: "Contact" },
    back: "← Back",
    startOver: "Start over",
    continue: "Continue",
    focusHeading: "What should we operate?",
    focusDescription: "Pick the closest starting point. We will refine it on the call.",
    focusOptions: [

        value: "First operation",
        title: "First operation",
        body: "Select one recurring workflow. We map its systems and decisions, build the governed layer, and begin operating it."
      },
      {
        value: "Managed operations",

        value: "Operating expansion",

        value: "Still exploring",

  };

      focus: paidVariant ? paidFocus : "",
      date: "",

      time: "",
      name: "",
      email: "",

    };

      window.posthog.capture(eventName, trackingProperties(properties));

  }

    return String(value || "").replace(/[&<>"']/g, function(ch){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch];
    });
  }

    var labels = Array.prototype.slice.call(document.querySelectorAll("aside div"));
    Object.keys(copy.briefLabels).forEach(function(key){

      var item = labels.find(function(el){ return el.textContent.trim() === englishLabel; });
      if (item && item.parentElement) item.parentElement.setAttribute("data-brief-key", key);
    });
  }

  function setBrief(key, value) {
    var item = document.querySelector('[data-brief-key="'+key+'"]');
    if (!item || !item.parentElement) return;
    var target = item.children[1];
    if (target) {
      target.textContent = value || "-";
      target.style.color = value ? "rgb(33, 29, 23)" : "rgb(181, 173, 156)";
    }
  }

  function focusLabel(value) {
    var option = copy.focusOptions.find(function(item){ return item.value === value; });
    return option ? option.title : value;
  }

  function localizeShell() {
    prepareBriefTargets();
    if (!paidVariant) return;

    document.documentElement.lang = "sv";
    document.title = copy.title;
    var heading = document.querySelector("body > h1");
    if (heading) heading.textContent = copy.heading;
    [
      ['meta[name="description"]', copy.description],
      ['meta[property="og:title"]', copy.title],
      ['meta[property="og:description"]', copy.description],
      ['meta[name="twitter:title"]', copy.title],
      ['meta[name="twitter:description"]', copy.description]
    ].forEach(function(entry){
      var meta = document.querySelector(entry[0]);
      if (meta) meta.setAttribute("content", entry[1]);
    });

    var rail = document.querySelector("[data-rail]");
    if (rail) {
      if (rail.children[1]) rail.children[1].textContent = copy.briefHeading;
      if (rail.children[3]) rail.children[3].innerHTML = copy.railDescription;
    }
    Object.keys(copy.briefLabels).forEach(function(key){
      var item = document.querySelector('[data-brief-key="'+key+'"]');
      if (item && item.children[0]) item.children[0].textContent = copy.briefLabels[key];
    });

    var currentStepLabels = ["Focus", "Time", "Details", "Confirmed"];
    Array.prototype.slice.call(stepper.querySelectorAll("span")).forEach(function(label){
      var index = currentStepLabels.indexOf(label.textContent.trim());
      if (index !== -1) label.textContent = copy.stepLabels[index];
    });
    back.textContent = copy.back;
    next.textContent = copy.continue;
  }

  function activateNext(enabled) {
    next.disabled = !enabled;
    next.style.cursor = enabled ? "pointer" : "not-allowed";
    next.style.background = enabled ? "rgb(33, 29, 23)" : "rgba(33, 29, 23, 0.12)";
    next.style.color = enabled ? "rgb(245, 241, 232)" : "rgba(33, 29, 23, 0.4)";
  }

  function paintStepper() {
    var circles = Array.prototype.slice.call(stepper.querySelectorAll("span")).filter(function(el){
      return /^[1-4]$/.test(el.textContent.trim());
    });
    circles.forEach(function(el, index){
      var active = index + 1 <= step;
      el.style.background = active ? "rgb(33, 29, 23)" : "transparent";
      el.style.color = active ? "rgb(245, 241, 232)" : "rgb(154, 147, 132)";
      el.style.borderColor = active ? "rgb(33, 29, 23)" : "rgba(33, 29, 23, 0.25)";
    });
    back.style.pointerEvents = step === 1 ? "none" : "auto";
    back.style.color = step === 1 ? "rgba(33, 29, 23, 0.25)" : "rgb(90, 83, 71)";
  }

  function choiceButton(title, body, attrs) {
    attrs = attrs || "";
    return '<button '+attrs+' style="text-align:left;cursor:pointer;padding:16px 18px;border-radius:4px;background:rgb(250,247,240);border:1px solid rgba(33,29,23,.16);box-shadow:none;transition:background .2s,border-color .2s,box-shadow .2s;">'
      + '<div style="display:flex;align-items:baseline;justify-content:space-between;gap:12px;">'
      + '<span style="font-size:16px;font-weight:500;">'+text(title)+'</span>'
      + '<span style="font-family:&quot;IBM Plex Mono&quot;,monospace;font-size:14px;color:rgb(168,67,43);">◇</span></div>'
      + '<div style="font-size:13px;color:rgb(90,83,71);margin-top:4px;">'+text(body)+'</div></button>';
  }

  function isoDate(date) {
    var y = date.getFullYear();
    var m = String(date.getMonth() + 1).padStart(2, "0");
    var d = String(date.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + d;
  }

  function addBusinessDays(count) {
    var date = new Date();
    var added = 0;
    while (added < count) {
      date.setDate(date.getDate() + 1);
      var day = date.getDay();
      if (day !== 0 && day !== 6) added += 1;
    }
    return date;
  }

  function dayOptions() {
    return [
      { label: copy.dayLabels[0], date: isoDate(addBusinessDays(1)) },
      { label: copy.dayLabels[1], date: isoDate(addBusinessDays(3)) },
      { label: copy.dayLabels[2], date: isoDate(addBusinessDays(6)) }
    ];
  }

  function renderFocus() {
    step = 1;
    content.innerHTML = '<div style="animation:.35s ease 0s 1 normal both running fadeup;flex:1;display:flex;flex-direction:column;">'
      + '<h2 style="font-family:Newsreader,serif;font-weight:400;font-size:clamp(24px,3.4vw,32px);letter-spacing:-.02em;margin:0 0 6px;">'+text(copy.focusHeading)+'</h2>'
      + '<p style="font-size:14.5px;color:rgb(90,83,71);margin:0 0 22px;">'+text(copy.focusDescription)+'</p>'
      + '<div style="display:flex;flex-direction:column;gap:10px;">'
      + copy.focusOptions.map(function(option){
        return choiceButton(option.title, option.body, 'data-focus="'+text(option.value)+'"');
      }).join("")
      + '</div></div>';
    content.querySelectorAll("[data-focus]").forEach(function(btn){
      btn.addEventListener("click", function(){
        state.focus = btn.getAttribute("data-focus");
        setBrief("focus", focusLabel(state.focus));
        content.querySelectorAll("[data-focus]").forEach(function(other){
          other.style.borderColor = other === btn ? "rgb(168, 67, 43)" : "rgba(33, 29, 23, 0.16)";
          other.style.background = other === btn ? "rgba(168, 67, 43, 0.06)" : "rgb(250,247,240)";
        });
        activateNext(true);
      });
    });
    if (paidVariant && state.focus) {
      var selected = Array.prototype.slice.call(content.querySelectorAll("[data-focus]")).find(function(btn){
        return btn.getAttribute("data-focus") === state.focus;
      });
      if (selected) {
        selected.style.borderColor = "rgb(168, 67, 43)";
        selected.style.background = "rgba(168, 67, 43, 0.06)";
      }
    }
    next.textContent = copy.continue;
    activateNext(!!state.focus);
    paintStepper();
  }

  function renderTime() {
    step = 2;
    var days = dayOptions();
    var times = ["09:30", "11:00", "14:00", "16:00"];
    content.innerHTML = '<div style="animation:.35s ease 0s 1 normal both running fadeup;flex:1;display:flex;flex-direction:column;">'
      + '<h2 style="font-family:Newsreader,serif;font-weight:400;font-size:clamp(24px,3.4vw,32px);letter-spacing:-.02em;margin:0 0 6px;">'+text(copy.timeHeading)+'</h2>'
      + '<p style="font-size:14.5px;color:rgb(90,83,71);margin:0 0 22px;">'+text(copy.timeDescription)+'</p>'
      + '<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px;">'
      + days.map(function(day){ return choiceButton(day.label, day.date, 'data-date="'+day.date+'" data-date-label="'+day.label+'"'); }).join("")
      + '</div><div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;">'
      + times.map(function(t){ return choiceButton(t, "Europe/Stockholm", 'data-time="'+t+'"'); }).join("")
      + '</div></div>';
    content.querySelectorAll("[data-date]").forEach(function(btn){
      btn.addEventListener("click", function(){
        state.date = btn.getAttribute("data-date");
        state.dateLabel = btn.getAttribute("data-date-label") || state.date;
        setBrief("date", state.dateLabel);
        content.querySelectorAll("[data-date]").forEach(function(other){ other.style.borderColor = other === btn ? "rgb(168,67,43)" : "rgba(33,29,23,.16)"; });
        activateNext(!!state.date && !!state.time);
      });
    });
    content.querySelectorAll("[data-time]").forEach(function(btn){
      btn.addEventListener("click", function(){
        state.time = btn.getAttribute("data-time");
        setBrief("time", state.time);
        content.querySelectorAll("[data-time]").forEach(function(other){ other.style.borderColor = other === btn ? "rgb(168,67,43)" : "rgba(33,29,23,.16)"; });
        activateNext(!!state.date && !!state.time);
      });
    });
    next.textContent = copy.continue;
    activateNext(!!state.date && !!state.time);
    paintStepper();
  }

  function input(name, label, type) {
    return '<label style="display:grid;gap:6px;font-size:13px;color:rgb(90,83,71);">'+text(label)
      + '<input name="'+name+'" type="'+(type || "text")+'" required style="width:100%;border:1px solid rgba(33,29,23,.16);background:rgb(250,247,240);border-radius:4px;padding:13px 14px;color:rgb(33,29,23);outline:none;"></label>';
  }

  function renderDetails() {
    step = 3;
    content.innerHTML = '<form id="booking-details" style="animation:.35s ease 0s 1 normal both running fadeup;flex:1;display:flex;flex-direction:column;">'
      + '<h2 style="font-family:Newsreader,serif;font-weight:400;font-size:clamp(24px,3.4vw,32px);letter-spacing:-.02em;margin:0 0 6px;">'+text(copy.detailsHeading)+'</h2>'
      + '<p style="font-size:14.5px;color:rgb(90,83,71);margin:0 0 22px;">'+text(copy.detailsDescription)+'</p>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">'+input("name",copy.fields.name)+input("email",copy.fields.email,"email")+'</div>'
      + input("company",copy.fields.company) + '<label style="display:grid;gap:6px;font-size:13px;color:rgb(90,83,71);margin-top:12px;">'+text(copy.fields.notes)+'<textarea name="notes" rows="4" style="width:100%;border:1px solid rgba(33,29,23,.16);background:rgb(250,247,240);border-radius:4px;padding:13px 14px;color:rgb(33,29,23);outline:none;resize:vertical;"></textarea></label>'
      + '</form>';
    var form = content.querySelector("form");
    form.addEventListener("input", function(){
      state.name = form.elements.name.value.trim();
      state.email = form.elements.email.value.trim();
      state.company = form.elements.company.value.trim();
      state.notes = form.elements.notes.value.trim();
      setBrief("contact", state.name || state.email);
      activateNext(!!state.name && !!state.email && !!state.company);
    });
    next.textContent = copy.send;
    activateNext(!!state.name && !!state.email && !!state.company);
    paintStepper();
  }

  function renderConfirmed(ok) {
    step = 4;
    content.innerHTML = '<div style="animation:.35s ease 0s 1 normal both running fadeup;flex:1;display:flex;flex-direction:column;justify-content:center;">'
      + '<h2 style="font-family:Newsreader,serif;font-weight:400;font-size:clamp(28px,3.8vw,40px);letter-spacing:-.02em;margin:0 0 12px;">'+text(ok ? copy.sentHeading : copy.failedHeading)+'</h2>'
      + '<p style="font-size:15px;line-height:1.6;color:rgb(90,83,71);max-width:44ch;margin:0;">'+text(ok ? copy.sentDescription : copy.fallback)+'</p>'
      + '</div>';
    next.style.display = "none";
    back.textContent = copy.startOver;
    back.style.pointerEvents = "auto";
    back.style.color = "rgb(90, 83, 71)";
    paintStepper();
  }

  async function submit() {
    next.disabled = true;
    next.textContent = copy.sending;
    captureBooking("nordsym_booking_submitted", { focus: state.focus });
    try {
      var res = await fetch(endpoint, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(Object.assign({
          source: webhookSource,
          submittedAt: new Date().toISOString()
        }, state, {
          acquisition: Object.assign({}, acquisition, paidVariant ? {
            lang: SUPPORTED_ROUTE.lang,
            offer: SUPPORTED_ROUTE.offer
          } : {})
        }))
      });
      captureBooking(res.ok ? "nordsym_booking_succeeded" : "nordsym_booking_failed", { focus: state.focus });
      renderConfirmed(res.ok);
    } catch (err) {
      captureBooking("nordsym_booking_failed", { focus: state.focus, reason: "network" });
      renderConfirmed(false);
    }
  }

  next.addEventListener("click", function(){
    if (step === 1 && state.focus) {
      captureBooking("nordsym_booking_focus_selected", { focus: state.focus });
      return renderTime();
    }
    if (step === 2 && state.date && state.time) {
      captureBooking("nordsym_booking_time_selected");
      return renderDetails();
    }
    if (step === 3 && state.name && state.email && state.company) return submit();
  });
  back.addEventListener("click", function(){
    if (step === 1) return;
    if (step === 4) {
      next.style.display = "";
      back.textContent = copy.back;
      state = initialState();
      ["focus","date","time","contact"].forEach(function(key){ setBrief(key, ""); });
      if (paidVariant) {
        setBrief("focus", focusLabel(state.focus));
        return renderTime();
      }
      return renderFocus();
    }
    if (step === 3) return renderTime();
    if (step === 2) return renderFocus();
  });
  localizeShell();
  if (paidVariant) {
    setBrief("focus", focusLabel(state.focus));
    renderTime();
  } else {
    renderFocus();
  }
})();
</script>
