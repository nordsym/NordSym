<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NordSym Email Signature</title>
    <style>
      body {
        margin: 0;
        padding: 32px;
        background: #efe9dd;
        color: #211e18;
        font-family: Arial, Helvetica, sans-serif;
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
      }
      .preview {
        background: #fff;
        border: 1px solid rgba(33, 30, 24, .18);
        padding: 28px;
      }
      .note {
        margin-top: 18px;
        font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: rgba(33, 30, 24, .62);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="preview">
        <table cellpadding="0" cellspacing="0" role="presentation" style="border-collapse:collapse;font-family:Arial,Helvetica,sans-serif;color:#211e18;">
          <tr>
            <td style="padding:0 0 14px 0;">
              <img src="./assets/brand/nordsym-lockup.png" width="175" height="30" alt="NordSym" style="display:block;border:0;outline:none;text-decoration:none;width:175px;height:30px;" />
            </td>
          </tr>
          <tr>
            <td style="border-top:1px solid #211e18;padding-top:14px;">
              <div style="font-size:18px;line-height:22px;font-weight:700;letter-spacing:-0.01em;color:#211e18;">Gustav Hemmingsson</div>
              <div style="font-size:13px;line-height:18px;color:#6f675b;margin-top:3px;">CEO, NordSym AB</div>
              <div style="font-size:11px;line-height:16px;color:#8a8174;letter-spacing:0.11em;text-transform:uppercase;margin-top:9px;">Managed Agent Operations</div>
              <div style="font-size:13px;line-height:20px;margin-top:12px;color:#211e18;">
                <a href="https://nordsym.com" style="color:#211e18;text-decoration:none;border-bottom:1px solid #b0492c;">nordsym.com</a>
                <span style="color:#b0492c;"> · </span>
                <a href="mailto:gustav@nordsym.com" style="color:#211e18;text-decoration:none;border-bottom:1px solid #b0492c;">gustav@nordsym.com</a>
                <span style="color:#b0492c;"> · </span>
                <span style="color:#211e18;">+46 70 529 25 83</span>
              </div>
              <div style="font-size:12px;line-height:18px;margin-top:12px;">
                <a href="https://nordsym.com/book/" style="display:inline-block;background:#211e18;color:#efe9dd;text-decoration:none;padding:8px 12px;font-size:11px;line-height:14px;letter-spacing:0.12em;text-transform:uppercase;">Book a review</a>
              </div>
            </td>
          </tr>
        </table>
      </div>
      <p class="note">Preview only. After deploy, use the same signature with the logo URL changed to https://nordsym.com/assets/brand/nordsym-lockup.png.</p>
    </div>
  </body>
</html>
